<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aic — how to use it (mobile sketchnote)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Kalam:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1c1a17;
        --paper: #fbf8ef;
        --desk: #e8e0cc;
        --red: #e8463c;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: var(--desk);
      }
      body {
        font-family: 'Kalam', cursive;
        color: var(--ink);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
        -webkit-font-smoothing: antialiased;
      }
      .paper {
        position: relative;
        width: min(600px, calc(100vw - 24px));
        aspect-ratio: 600 / 1100;
        background: var(--paper);
        background-image: radial-gradient(
          620px 360px at 20% 0%,
          rgba(255, 240, 190, 0.4),
          transparent 62%
        );
        box-shadow:
          0 28px 50px -20px rgba(60, 50, 30, 0.45),
          0 2px 8px -1px rgba(60, 50, 30, 0.15);
        border-radius: 3px;
        overflow: hidden;
      }
      .paper::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        opacity: 0.05;
        mix-blend-mode: multiply;
        pointer-events: none;
        z-index: 5;
      }
      .stage {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
      }
      svg.diagram {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="paper">
      <div class="stage">
        <svg
          class="diagram"
          viewBox="0 0 600 1100"
          xmlns="http://www.w3.org/2000/svg"
          role="img"
          aria-label="How to use aic — mobile sketchnote"
        ></svg>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.js"></script>
    <script>
      (function () {
        const svg = document.querySelector('svg.diagram');
        const rc = rough.svg(svg);
        const NS = 'http://www.w3.org/2000/svg';
        const ink = '#1c1a17';
        const red = '#e8463c';

        const boxOpts = {
          stroke: ink,
          strokeWidth: 2.4,
          roughness: 1.5,
          bowing: 2.0,
          seed: 3,
        };
        const iconOpts = {
          stroke: ink,
          strokeWidth: 2.0,
          roughness: 1.2,
          bowing: 1.5,
          seed: 9,
        };
        const arrowOpts = {
          stroke: ink,
          strokeWidth: 2.2,
          roughness: 1.4,
          bowing: 1.0,
          seed: 5,
        };
        const redOpts = {
          stroke: red,
          strokeWidth: 2.6,
          roughness: 1.4,
          bowing: 1.2,
          seed: 17,
        };

        function rect(x, y, w, h, o = iconOpts) {
          svg.appendChild(rc.rectangle(x, y, w, h, o));
        }
        function line(x1, y1, x2, y2, o = iconOpts) {
          svg.appendChild(rc.line(x1, y1, x2, y2, o));
        }
        function circle(cx, cy, r, o = iconOpts) {
          svg.appendChild(rc.circle(cx, cy, r * 2, o));
        }
        function poly(pts, o = iconOpts) {
          svg.appendChild(rc.polygon(pts, o));
        }
        function lpath(pts, o = iconOpts) {
          svg.appendChild(rc.linearPath(pts, o));
        }
        function path(d, o = iconOpts) {
          svg.appendChild(rc.path(d, o));
        }
        function text(x, y, str, opts) {
          const t = document.createElementNS(NS, 'text');
          t.setAttribute('x', x);
          t.setAttribute('y', y);
          t.setAttribute('text-anchor', opts.anchor || 'middle');
          t.setAttribute('font-family', opts.font || 'Kalam, cursive');
          t.setAttribute('font-size', opts.size || 14);
          t.setAttribute('font-weight', opts.weight || 400);
          t.setAttribute('fill', opts.color || ink);
          if (opts.style) t.setAttribute('font-style', opts.style);
          t.textContent = str;
          svg.appendChild(t);
        }
        function arrow(x1, y1, x2, y2, o = arrowOpts) {
          line(x1, y1, x2, y2, o);
          const a = Math.atan2(y2 - y1, x2 - x1);
          const L = 11;
          line(x2, y2, x2 - L * Math.cos(a - 0.5), y2 - L * Math.sin(a - 0.5), o);
          line(x2, y2, x2 - L * Math.cos(a + 0.5), y2 - L * Math.sin(a + 0.5), o);
        }
        function highlighter(x, y, w, h, color, rotate = -0.7) {
          const g = document.createElementNS(NS, 'g');
          g.setAttribute('transform', `rotate(${rotate} ${x + w / 2} ${y + h / 2})`);
          const r1 = document.createElementNS(NS, 'rect');
          r1.setAttribute('x', x);
          r1.setAttribute('y', y);
          r1.setAttribute('width', w);
          r1.setAttribute('height', h);
          r1.setAttribute('fill', color);
          r1.setAttribute('opacity', '0.55');
          g.appendChild(r1);
          const r2 = document.createElementNS(NS, 'rect');
          r2.setAttribute('x', x + 2);
          r2.setAttribute('y', y + 1.5);
          r2.setAttribute('width', w - 3);
          r2.setAttribute('height', h - 3);
          r2.setAttribute('fill', color);
          r2.setAttribute('opacity', '0.4');
          g.appendChild(r2);
          svg.appendChild(g);
        }

        // ---------- header ----------
        // title with red "aic"
        (function () {
          const t = document.createElementNS(NS, 'text');
          t.setAttribute('x', 300);
          t.setAttribute('y', 70);
          t.setAttribute('text-anchor', 'middle');
          t.setAttribute('font-family', 'Caveat, cursive');
          t.setAttribute('font-size', 48);
          t.setAttribute('font-weight', 700);
          t.setAttribute('fill', ink);
          const a = document.createElementNS(NS, 'tspan');
          a.textContent = 'how to use ';
          const b = document.createElementNS(NS, 'tspan');
          b.textContent = 'aic';
          b.setAttribute('fill', red);
          t.appendChild(a);
          t.appendChild(b);
          svg.appendChild(t);
        })();
        path('M 120 86 Q 200 78 280 84 T 410 82 T 480 86', {
          stroke: ink,
          strokeWidth: 3,
          roughness: 1.3,
          bowing: 1.2,
          seed: 2,
        });
        text(300, 116, 'install once  →  type aic  →  clean commit.', {
          font: 'Kalam, cursive',
          size: 16,
          color: '#4a4640',
        });

        // ---------- layout ----------
        const cardX = 40,
          cardW = 520,
          cardH = 88,
          gap = 24,
          startY = 146;
        const cardY = [0, 1, 2, 3, 4, 5].map((i) => startY + i * (cardH + gap));
        const iconCX = 96;
        const labelX = 172;

        const steps = [
          { label: 'install', sub: 'brew install aic' },
          { label: 'setup', sub: 'provider · key · model' },
          { label: 'run', sub: 'type aic — staged or not' },
          { label: 'read diff', sub: 'reads your changes' },
          { label: 'draft', sub: 'writes the commit msg' },
          { label: 'commit', sub: 'ships it  ✓' },
        ];

        // ---------- yellow highlighter behind card 3 (run) ----------
        highlighter(
          cardX - 6,
          cardY[2] - 6,
          cardW + 12,
          cardH + 12,
          'rgba(255,225,77,0.5)',
          -0.6,
        );

        // ---------- cards ----------
        cardY.forEach((y) => rect(cardX, y, cardW, cardH, boxOpts));

        // ---------- down arrows ----------
        for (let i = 0; i < 5; i++) {
          arrow(300, cardY[i] + cardH + 2, 300, cardY[i + 1] - 2);
        }

        // ---------- icons (origin at card icon center) ----------
        function iconInstall(cx, cy) {
          line(cx, cy - 22, cx, cy + 4);
          line(cx - 9, cy - 5, cx, cy + 4);
          line(cx + 9, cy - 5, cx, cy + 4);
          line(cx - 18, cy + 13, cx + 18, cy + 13);
          line(cx - 15, cy + 13, cx - 15, cy + 8);
          line(cx + 15, cy + 13, cx + 15, cy + 8);
        }
        function iconSetup(cx, cy) {
          circle(cx - 13, cy, 9);
          line(cx - 4, cy, cx + 19, cy);
          line(cx + 10, cy, cx + 10, cy + 6);
          line(cx + 16, cy, cx + 16, cy + 7);
        }
        function iconRun(cx, cy) {
          rect(cx - 23, cy - 16, 46, 32);
          line(cx - 23, cy - 8, cx + 23, cy - 8);
          line(cx - 16, cy - 1, cx - 10, cy + 5);
          line(cx - 10, cy + 5, cx - 16, cy + 11);
          line(cx - 4, cy + 5, cx + 14, cy + 5);
        }
        function iconRead(cx, cy) {
          lpath([
            [cx - 14, cy - 22],
            [cx + 8, cy - 22],
            [cx + 16, cy - 14],
            [cx + 16, cy + 22],
            [cx - 14, cy + 22],
            [cx - 14, cy - 22],
          ]);
          lpath([
            [cx + 8, cy - 22],
            [cx + 8, cy - 14],
            [cx + 16, cy - 14],
          ]);
          line(cx - 8, cy - 6, cx + 10, cy - 6);
          line(cx - 8, cy, cx + 10, cy);
          line(cx - 8, cy + 6, cx + 4, cy + 6);
          line(cx - 8, cy + 12, cx + 10, cy + 12);
        }
        function iconDraft(cx, cy) {
          const A = [cx + 13, cy - 6],
            B = [cx + 6, cy - 13],
            C = [cx + 17, cy - 10],
            D = [cx + 10, cy - 17],
            T = [cx - 12, cy + 12];
          poly([A, B, D, C]);
          lpath([A, T, B, A]);
          line(cx - 18, cy + 18, cx + 8, cy + 18);
        }
        function iconCommit(cx, cy) {
          circle(cx, cy, 20);
          line(cx - 10, cy + 1, cx - 2, cy + 9);
          line(cx - 2, cy + 9, cx + 11, cy - 7);
        }
        const icons = [iconInstall, iconSetup, iconRun, iconRead, iconDraft, iconCommit];
        cardY.forEach((y, i) => icons[i](iconCX, y + 44));

        // divider between icon zone and text zone
        cardY.forEach((y, i) =>
          line(150, y + 14, 150, y + 74, {
            stroke: ink,
            strokeWidth: 1.3,
            roughness: 1.3,
            bowing: 1,
            seed: 7 + i,
          }),
        );

        // ---------- card text ----------
        cardY.forEach((y, i) => {
          text(labelX, y + 38, steps[i].label, {
            font: 'Caveat, cursive',
            size: 27,
            weight: 700,
            anchor: 'start',
          });
          text(labelX, y + 64, steps[i].sub, {
            font: 'Kalam, cursive',
            size: 15,
            color: '#4a4640',
            anchor: 'start',
          });
          text(cardX + cardW - 16, y + 26, i + 1 + ')', {
            font: 'Caveat, cursive',
            size: 18,
            color: '#9a948a',
            anchor: 'end',
          });
        });

        // ---------- red sparkle near commit card ----------
        (function sparkle(cx, cy, s) {
          path(`M ${cx} ${cy - s} L ${cx} ${cy + s}`, redOpts);
          path(`M ${cx - s} ${cy} L ${cx + s} ${cy}`, redOpts);
          const q = s * 0.42;
          path(`M ${cx - q} ${cy - q} L ${cx + q} ${cy + q}`, redOpts);
          path(`M ${cx - q} ${cy + q} L ${cx + q} ${cy - q}`, redOpts);
        })(548, 716, 12);

        // ---------- bottom callout: auto-batching ----------
        const bx = 40,
          by = 814,
          bw = 520,
          bh = 130;
        rect(bx, by, bw, bh, {
          ...boxOpts,
          strokeWidth: 2.2,
          roughness: 1.7,
          bowing: 1.5,
          seed: 21,
        });
        (function stack(cx, cy) {
          rect(cx - 18, cy - 14, 38, 11);
          rect(cx - 12, cy - 2, 38, 11);
          rect(cx - 6, cy + 10, 38, 11);
          line(cx - 14, cy - 9, cx - 6, cy - 9);
        })(86, 880);
        text(150, 850, 'nothing staged?', {
          font: 'Caveat, cursive',
          size: 24,
          weight: 700,
          anchor: 'start',
        });
        text(150, 876, 'aic groups your unstaged work into', {
          font: 'Kalam, cursive',
          size: 15,
          anchor: 'start',
        });
        text(150, 897, 'logical commits — and ships each one.', {
          font: 'Kalam, cursive',
          size: 15,
          anchor: 'start',
        });
        text(150, 921, 'auto-batching  ✦', {
          font: 'Kalam, cursive',
          size: 13,
          anchor: 'start',
          color: '#7a746a',
          style: 'italic',
        });

        // ---------- providers note ----------
        text(40, 978, 'your key · your model', {
          font: 'Caveat, cursive',
          size: 24,
          weight: 700,
          anchor: 'start',
        });
        path('M 42 988 Q 130 982 230 988', {
          stroke: ink,
          strokeWidth: 2.2,
          roughness: 1.3,
          bowing: 1.2,
          seed: 31,
        });
        text(40, 1008, 'OpenAI · Anthropic · Gemini · DeepSeek · Groq · Ollama', {
          font: 'Kalam, cursive',
          size: 15,
          anchor: 'start',
        });
        text(40, 1031, 'no middleman · no per-commit markup', {
          font: 'Kalam, cursive',
          size: 13,
          anchor: 'start',
          color: '#7a746a',
        });

        // ---------- credit ----------
        text(300, 1075, 'github.com/CaicoLeung/aic', {
          font: 'Kalam, cursive',
          size: 13,
          color: '#9a948a',
        });
      })();
    </script>
  </body>
</html>
